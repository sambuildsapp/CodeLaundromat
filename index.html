<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLaundromat Project Structure</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 2rem;
            line-height: 1.5;
            color: #333;
        }

        h1 {
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 0.5rem;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 1rem 0;
        }

        a {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: #00d2ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        a:hover {
            background-color: #00b4db;
        }
    </style>
</head>

<body>
    <h1>CodeLaundromat Project Contents</h1>
    <p>Welcome to the CodeLaundromat project table of contents.</p>

    <ul>
        <li>
            <a href="/website/">Open CodeLaundromat Website</a>
        </li>
    </ul>
</body>

</html>
